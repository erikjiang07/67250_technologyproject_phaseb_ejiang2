<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Erik Jiang">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>Checkout</title>
    <!-- jQuery library from jquery.com -->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <!-- Google Fonts used: Cormorant Garamond and Inter (fonts.google.com) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <div class="container">

        <header class="header">
            <a href="../index.html">
                <div id="logo">
                    <span class="logo-title">MONOMUSE</span>
                    <br>
                    <span class="logo-subtitle">Museum of Fashion & Technology</span>
                </div>
            </a>
        </header>

        <nav class="nav_bar">
            <span id="hamburger" onclick="toggleNav()">&#9776;</span>
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a  class="buy-button"  href="buytickets.html">Buy Tickets</a>
        </nav>

        <main class="main">
            <h2>Checkout</h2>

            <div class="checkout-row">
                <div class="checkout-field">
                    <label>Visit Date (required)</label>
                    <input type="date" id="visitDate" required>
                </div>
                <div class="checkout-field">
                    <label>Ticket Type (required)</label>
                    <select id="ticketType" required>
                        <option value="">Select ticket type</option>
                        <option value="general">General</option>
                        <option value="student">Student</option>
                        <option value="member">Member</option>
                    </select>
                </div>
            </div>

            <div class="checkout-row">
                <div class="checkout-field">
                    <label>Quantity (1–10, required)</label>
                    <input type="number" id="ticketQty" min="1" max="10" value="1" required oninput="updatePrice()">
                </div>
                <div class="checkout-total">
                    <span class="checkout-total-label">Total</span>
                    <span class="checkout-total-price">$<span id="totalPrice">18</span></span>
                </div>
            </div>

            <hr class="checkout-divider">

            <div class="checkout-row">
                <div class="checkout-field">
                    <label>Email (required)</label>
                    <input type="email" id="email" required>
                </div>
                <div class="checkout-field">
                    <label>Zip Code (optional)</label>
                    <input type="text" id="zipCode" maxlength="5">
                </div>
            </div>

            <label class="checkout-checkbox">
                <input type="checkbox" id="mailingList" style="width: auto; margin-right: 8px;">
                Join our mailing list
            </label>

            <button onclick="placeOrder()" class="checkout-button">Place Order</button>

            <p id="errorMsg" style="color: #C9A96E; display: none;"></p>
        </main>

        <footer class="footer">
            <p id="copyYear"></p>
        </footer>

    </div>
</body>
</html>
